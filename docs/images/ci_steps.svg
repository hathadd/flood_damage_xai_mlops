<svg xmlns="http://www.w3.org/2000/svg" width="900" height="540" viewBox="0 0 900 540">
  <style>text{font-family:Arial, sans-serif; font-size:14px;} .title{font-size:18px;font-weight:bold;} .box{fill:#f5f7ff;stroke:#2a4f9d;stroke-width:2;} .number{font-weight:bold;} .arrow{fill:none;stroke:#2a4f9d;stroke-width:2;marker-end:url(#arrow);} </style>
  <defs><marker id="arrow" viewBox="0 0 10 10" refX="10" refY="5" markerWidth="6" markerHeight="6" orient="auto"><path d="M 0 0 L 10 5 L 0 10 z" fill="#2a4f9d"/></marker></defs>
  <text x="30" y="30" class="title">Figure 2 : Étapes détaillées du workflow CI</text>
  <rect class="box" x="30" y="60" width="260" height="80" rx="10"/> <text x="40" y="90" class="number">1.</text><text x="70" y="90">Checkout repository</text><text x="70" y="112">actions/checkout@v4</text>
  <rect class="box" x="30" y="160" width="260" height="80" rx="10"/> <text x="40" y="190" class="number">2.</text><text x="70" y="190">Setup Python 3.11</text><text x="70" y="212">actions/setup-python@v5</text>
  <rect class="box" x="30" y="260" width="260" height="80" rx="10"/> <text x="40" y="290" class="number">3.</text><text x="70" y="290">Install requirements</text><text x="70" y="312">requirements-ci.txt</text>
  <rect class="box" x="30" y="360" width="260" height="80" rx="10"/> <text x="40" y="390" class="number">4.</text><text x="70" y="390">Verify files</text><text x="70" y="412">configs, Docker, docs</text>
  <rect class="box" x="330" y="60" width="260" height="80" rx="10"/> <text x="340" y="90" class="number">5.</text><text x="370" y="90">Compile sources</text><text x="370" y="112">python -m compileall</text>
  <rect class="box" x="330" y="160" width="260" height="80" rx="10"/> <text x="340" y="190" class="number">6.</text><text x="370" y="190">Run lightweight tests</text><text x="370" y="212">pytest tests/test_imports.py</text>
  <rect class="box" x="330" y="260" width="260" height="80" rx="10"/> <text x="340" y="290" class="number">7.</text><text x="370" y="290">Run readiness tests</text><text x="370" y="312">pytest tests/test_ci_readiness.py</text>
  <path class="arrow" d="M 160 140 L 160 160"/>
  <path class="arrow" d="M 160 240 L 160 260"/>
  <path class="arrow" d="M 160 340 L 160 360"/>
  <path class="arrow" d="M 450 140 L 450 160"/>
  <path class="arrow" d="M 450 240 L 450 260"/>
</svg>
