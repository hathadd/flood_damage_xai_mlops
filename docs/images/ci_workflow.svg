<svg xmlns="http://www.w3.org/2000/svg" width="900" height="420" viewBox="0 0 900 420">
  <style>text{font-family:Arial, sans-serif; font-size:14px;} .title{font-size:18px;font-weight:bold;} .box{fill:#eef4ff;stroke:#3a72d6;stroke-width:2;} .arrow{fill:none;stroke:#3a72d6;stroke-width:3;marker-end:url(#arrow);} </style>
  <defs><marker id="arrow" viewBox="0 0 10 10" refX="10" refY="5" markerWidth="6" markerHeight="6" orient="auto"><path d="M 0 0 L 10 5 L 0 10 z" fill="#3a72d6"/></marker></defs>
  <text x="30" y="30" class="title">Figure 1 : Architecture du workflow CI</text>
  <rect class="box" x="30" y="60" width="180" height="60" rx="10"/> <text x="60" y="95">Checkout</text>
  <rect class="box" x="250" y="60" width="180" height="60" rx="10"/> <text x="300" y="95">Setup Python</text>
  <rect class="box" x="470" y="60" width="180" height="60" rx="10"/> <text x="530" y="95">Install deps</text>
  <rect class="box" x="690" y="60" width="180" height="60" rx="10"/> <text x="740" y="95">Verify files</text>
  <path class="arrow" d="M 210 90 L 250 90"/>
  <path class="arrow" d="M 430 90 L 470 90"/>
  <path class="arrow" d="M 650 90 L 690 90"/>
  <rect class="box" x="30" y="180" width="180" height="60" rx="10"/> <text x="55" y="215">Compile code</text>
  <rect class="box" x="250" y="180" width="180" height="60" rx="10"/> <text x="270" y="215">Run tests</text>
  <path class="arrow" d="M 120 140 L 120 180"/>
  <path class="arrow" d="M 430 210 L 470 210"/>
  <rect class="box" x="470" y="180" width="180" height="60" rx="10"/> <text x="510" y="215">Result</text>
  <path class="arrow" d="M 430 210 L 470 210"/>
</svg>
