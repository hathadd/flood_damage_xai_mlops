name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

jobs:
  ci:
    runs-on: ubuntu-latest
    env:
      PYTHONPATH: ${{ github.workspace }}

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Set up Python 3.11
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'
          cache: 'pip'

      - name: Upgrade pip
        run: python -m pip install --upgrade pip

      - name: Install dependencies
        run: pip install -r requirements.txt

      - name: Verify essential project files
        run: |
          test -f configs/data.yaml
          test -f configs/monitoring.yaml
          test -f requirements.txt
          test -f src/serving/api.py
          test -f src/demo/streamlit_app.py

      - name: Compile Python sources
        run: python -m compileall src tests

      - name: Run lightweight import tests
        run: pytest -q tests/test_imports.py
